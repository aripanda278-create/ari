name: Update Travian map

on:
  schedule:
    # GitHub schedule events can be delayed or dropped. One run therefore stays
    # alive and performs its own five-minute checks for a little over five hours.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      continuous:
        description: Keep checking every five minutes
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: travian-map-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Watch Travian map
        shell: bash
        run: |
          git config user.name "Travian Map Bot"
          git config user.email "actions@users.noreply.github.com"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.continuous }}" = "false" ]; then
            checks=1
          else
            checks=65
          fi

          for ((i=1; i<=checks; i++)); do
            echo "Check $i/$checks at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin main
            curl --fail --silent --show-error --retry 3 \
              --output map-new.sql \
              https://ts4.x1.international.travian.com/map.sql

            if cmp -s map-new.sql map-latest.sql; then
              rm map-new.sql
              echo "No server changes"
            else
              mv map-new.sql map-latest.sql
              node scripts/update-map.mjs map-latest.sql public/map-data.js
              git add map-latest.sql public/map-data.js
              git commit -m "Update Travian server data"
              git push origin main
            fi

            if [ "$i" -lt "$checks" ]; then
              sleep 300
            fi
          done
