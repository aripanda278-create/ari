name: Update Travian map

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: travian-map-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get project
        uses: actions/checkout@v4

      - name: Download current Travian map
        run: curl --fail --silent --show-error --retry 3 --output map-new.sql https://ts4.x1.international.travian.com/map.sql

      - name: Check for server changes
        id: changes
        shell: bash
        run: |
          if cmp -s map-new.sql map-latest.sql; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            mv map-new.sql map-latest.sql
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build map data
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/update-map.mjs map-latest.sql public/map-data.js

      - name: Save updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Travian Map Bot"
          git config user.email "actions@users.noreply.github.com"
          git add map-latest.sql public/map-data.js
          git commit -m "Update Travian server data"
          git push
