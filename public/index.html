<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#f4f1e8">
  <title>M HQ</title>
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="style.css?v=20260717-5">
</head>
<body>
  <section id="gate" class="gate">
    <div class="gate-card">
      <div class="brand-mark">M</div>
      <p class="eyebrow" data-t="allianceCommand">ALLIANCE COMMAND</p>
      <h1>M HQ</h1>
      <p class="lead" data-t="loginIntro">Upiši Travian avatar i potvrdi identitet Google računom.</p>
      <label><span data-t="avatar">Avatar ime</span><input id="avatarInput" autocomplete="nickname" placeholder="Pacov"></label>
      <label><span data-t="language">Jezik</span><select id="languageInput"><option value="hr">Hrvatski</option><option value="en">English</option></select></label>
      <div class="gate-actions">
        <button id="googleLogin" class="primary" data-t="googleLogin">Nastavi s Google računom</button>
      </div>
      <p id="gateStatus" class="status"></p>
    </div>
  </section>

  <div id="app" class="app hidden">
    <header class="topbar">
      <button id="menuToggle" class="icon-button mobile-only" aria-label="Menu">☰</button>
      <a class="brand" href="#dashboard"><span class="brand-mark small">M</span><span><b>M HQ</b><small data-t="allianceCommand">ALLIANCE COMMAND</small></span></a>
      <div class="server-state"><i></i><span data-t="liveData">Server podaci</span><b id="dataAge">—</b></div>
      <div class="top-actions">
        <button id="globalSearchButton" class="search-button"><span>⌕</span><span data-t="search">Traži igrača, savez ili koordinate</span><kbd>/</kbd></button>
        <select id="languageTop" aria-label="Language"><option value="hr">HR</option><option value="en">EN</option></select>
        <button id="themeToggle" class="icon-button" aria-label="Theme">◐</button>
        <button id="profileButton" class="profile-button"><span id="profileInitial">M</span><span><b id="profileName">—</b><small id="profileRole">MEMBER</small></span></button>
      </div>
    </header>

    <aside id="sidebar" class="sidebar">
      <nav id="mainNav">
        <p data-t="workspace">RADNI PROSTOR</p>
        <button data-view="dashboard" class="active"><span>⌂</span><b data-t="dashboard">Pregled</b></button>
        <button data-view="map"><span>⌖</span><b data-t="map">Karta</b></button>
        <button data-view="alliance"><span>♙</span><b data-t="alliance">Savez</b></button>
        <button data-view="plans"><span>◎</span><b data-t="plans">Planeri</b></button>
        <button data-view="tools"><span>⌁</span><b data-t="tools">Alati</b></button>
        <p data-t="coordination">KOORDINACIJA</p>
        <button data-view="operations"><span>⚔</span><b data-t="operations">Operacije</b></button>
        <button data-view="reports"><span>▤</span><b data-t="reports">Izvještaji</b></button>
        <button data-view="diplomacy"><span>⚑</span><b data-t="diplomacy">Diplomacija</b></button>
      </nav>
      <div class="sidebar-foot"><span id="worldName">ts4.x1</span><small data-t="world">Travian svijet</small></div>
    </aside>

    <main id="content">
      <section id="dashboard" class="view active"></section>
      <section id="map" class="view"></section>
      <section id="alliance" class="view"></section>
      <section id="plans" class="view"></section>
      <section id="tools" class="view"></section>
      <section id="operations" class="view"></section>
      <section id="reports" class="view"></section>
      <section id="diplomacy" class="view"></section>
    </main>
  </div>

  <dialog id="searchDialog"><form method="dialog" class="dialog-card"><div class="dialog-head"><input id="globalSearch" autocomplete="off" data-t-placeholder="searchPlaceholder" placeholder="Igrač, savez, selo ili 12|-34"><button data-t-aria="close" aria-label="Zatvori">×</button></div><div id="searchResults" class="search-results"></div></form></dialog>
  <div id="toast" class="toast"></div>
  <script src="map-data.js?v=20260717-5"></script>
  <script type="module" src="app.js?v=20260717-5"></script>
</body>
</html>
